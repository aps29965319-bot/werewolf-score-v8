
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>捕夢狼人殺 V1</title>
</head>
<body>
<h1>捕夢狼人殺 V1</h1>

<form action="/add" method="post">
<input name="name" placeholder="玩家名稱" required>
<button>新增玩家</button>
</form>

<p><a href="/reset">全部歸零</a></p>

<h2>MVP排行榜</h2>

{% for p in players %}
<hr>
<b>{{p.name}}</b><br>
分數：{{p.score}}<br>
戰績：{{p.wins}}勝 {{p.losses}}敗<br>
勝率：{{p.win_rate}}%<br>
<a href="/win/{{p.id}}">勝利(+3)</a>
<a href="/lose/{{p.id}}">失敗(+0)</a>
<a href="/delete/{{p.id}}">刪除</a>
{% endfor %}

</body>
</html>
